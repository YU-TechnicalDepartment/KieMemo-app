<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消えメモ</title>

    <!-- Base CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/theme.css">

    <!-- Components -->
    <link rel="stylesheet" href="css/components/memo-card.css">
    <link rel="stylesheet" href="css/components/dialog.css">
    <link rel="stylesheet" href="css/components/toolbar.css">
</head>
<body>

    <header class="toolbar glass">
        <div class="toolbar-left">
            <h1>消えメモ</h1>
        </div>
        <div class="toolbar-right">
            <label class="duration-label">
                消えるまで：
                <select id="durationSelect">
                    <option value="30000">30秒</option>
                    <option value="60000">1分</option>
                    <option value="180000">3分</option>
                    <option value="300000">5分</option>
                </select>
            </label>
            <button id="newMemoBtn" class="primary">＋</button>
        </div>
    </header>

    <main id="memoList" class="memo-list"></main>

    <!-- New Memo Dialog -->
    <div id="memoDialog" class="dialog glass hidden">
        <textarea id="memoInput" placeholder="メモを入力..."></textarea>

        <div class="dialog-actions">
            <button id="saveMemoBtn" class="primary">保存</button>
            <button id="closeDialogBtn" class="close">閉じる</button>
        </div>
    </div>

    <!-- ES Modules で app.js だけ読み込む -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
