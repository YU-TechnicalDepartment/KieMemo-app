<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メモ編集 - 消えメモ</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/pages/edit.css">
</head>
<body>

    <header class="edit-toolbar glass">
        <button id="backBtn" class="icon-btn">
            <span class="material-symbols-rounded">arrow_back</span>
        </button>

        <h1 id="editTitle">新しいメモ</h1>

        <button id="saveBtn" class="icon-btn save">
            <span class="material-symbols-rounded">check</span>
        </button>
    </header>

    <main class="edit-container">

        <input id="memoTitle" class="memo-title" placeholder="タイトル">

        <textarea id="memoBody" class="memo-body" placeholder="本文を入力..."></textarea>

        <div class="duration-box glass">
            <label>消えるまでの時間</label>

            <div class="duration-inputs">
                <input id="durationMin" type="number" min="0" max="999" value="0"> 分
                <input id="durationSec" type="number" min="0" max="59" value="30"> 秒
            </div>
        </div>

        <div class="qr-buttons">
            <button id="qrReadBtn" class="icon-btn">
                <span class="material-symbols-rounded">qr_code_scanner</span>
            </button>

            <button id="qrMakeBtn" class="icon-btn">
                <span class="material-symbols-rounded">qr_code_2</span>
            </button>
        </div>

        <button id="deleteBtn" class="delete-btn hidden">
            <span class="material-symbols-rounded">delete</span>
            削除
        </button>

    </main>

    <!-- カスタムダイアログ -->
    <div id="confirmDialog" class="confirm hidden">
        <div class="confirm-panel glass">
            <p id="confirmMessage">本当に削除しますか？</p>
            <div id="confirmContent"></div>

            <div class="confirm-buttons">
                <button id="confirmCancel" class="cancel-btn">キャンセル</button>
                <button id="confirmOk" class="ok-btn">OK</button>
            </div>
        </div>
    </div>

    <!-- 🔥 QRライブラリを script タグで読み込む（これが重要） -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <script type="module" src="js/edit.js"></script>
</body>
</html>
