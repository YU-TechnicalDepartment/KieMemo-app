<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メモ編集 - 消えメモ</title>

    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />

    <!-- Base CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/pages/edit.css">
</head>
<body>

    <header class="edit-toolbar glass">
        <button id="backBtn" class="icon-btn">
            <span class="material-symbols-rounded">arrow_back</span>
        </button>

        <h1 id="editTitle">新しいメモ</h1>

        <button id="saveBtn" class="icon-btn save">
            <span class="material-symbols-rounded">check</span>
        </button>
    </header>

    <main class="edit-container">

        <input id="memoTitle" class="memo-title" placeholder="タイトル">

        <textarea id="memoBody" class="memo-body" placeholder="本文を入力..."></textarea>

        <div class="duration-box glass">
            <label>消えるまでの時間</label>
            <select id="durationSelect">
                <option value="30000">30秒</option>
                <option value="60000">1分</option>
                <option value="180000">3分</option>
                <option value="300000">5分</option>
            </select>
        </div>

        <button id="deleteBtn" class="delete-btn hidden">
            <span class="material-symbols-rounded">delete</span>
            削除
        </button>

    </main>

    <script type="module" src="js/edit.js"></script>
</body>
</html>
